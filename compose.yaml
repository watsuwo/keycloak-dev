name: keycloak-dev

services:
  traefik:
    image: traefik:${TRAEFIK_VERSION:-v3.1}
    container_name: keycloak-traefik
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - keycloak-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - keycloak-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.0}
    container_name: keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      # 26.x 以降の管理者ブートストラップ用環境変数
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
      # Traefikが前段でTLS終端する構成
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-https://keycloak.localtest.me}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}
      # 開発時のThemeキャッシュ無効化
      KC_SPI_THEME_STATIC_MAX_AGE: "-1"
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    volumes:
      - ./keycloak/providers:/opt/keycloak/providers:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
      - ./keycloak/realms:/opt/keycloak/data/import:ro
    ports:
      # mgmt(健康/メトリクス)のみ直接公開。HTTP(8080)はTraefik経由
      - "${KC_MGMT_PORT:-9000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; timeout --preserve-status 1 cat <&3 | grep -m1 -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`keycloak.${BASE_DOMAIN:-localtest.me}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - keycloak-net
    restart: unless-stopped

  whoami:
    image: traefik/whoami:latest
    container_name: keycloak-whoami
    networks:
      - keycloak-net
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    container_name: keycloak-oauth2-proxy
    command:
      - --provider=keycloak-oidc
      - --client-id=dev-client
      - --client-secret=dev-client-secret
      # ブラウザ向けはKeycloakの外部URL、サーバ間通信はdocker内部URLを使う
      - --oidc-issuer-url=https://keycloak.${BASE_DOMAIN:-localtest.me}/realms/example-customer
      - --skip-oidc-discovery=true
      - --login-url=https://keycloak.${BASE_DOMAIN:-localtest.me}/realms/example-customer/protocol/openid-connect/auth
      - --redeem-url=http://keycloak:8080/realms/example-customer/protocol/openid-connect/token
      - --oidc-jwks-url=http://keycloak:8080/realms/example-customer/protocol/openid-connect/certs
      - --logout-url=https://keycloak.${BASE_DOMAIN:-localtest.me}/realms/example-customer/protocol/openid-connect/logout
      - --redirect-url=https://app.${BASE_DOMAIN:-localtest.me}/oauth2/callback
      - --upstream=http://whoami:80
      - --http-address=0.0.0.0:4180
      # 開発用固定値 — 本番では必ず変更すること (16/24/32バイトのbase64値)
      - --cookie-secret=MTIzNDU2Nzg5MDEyMzQ1Ng==
      - --cookie-secure=true
      - --email-domain=*
      - --scope=openid profile email
      - --skip-provider-button=true
      - --insecure-oidc-skip-issuer-verification=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.${BASE_DOMAIN:-localtest.me}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=4180"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - keycloak-net
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: keycloak-mailhog
    ports:
      # SMTP受信のみ直接公開 (ホスト側アプリからも送れるよう)
      # Web UIはTraefik経由でhttps://mailhog.${BASE_DOMAIN}/
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailhog.rule=Host(`mailhog.${BASE_DOMAIN:-localtest.me}`)"
      - "traefik.http.routers.mailhog.entrypoints=websecure"
      - "traefik.http.routers.mailhog.tls=true"
      - "traefik.http.services.mailhog.loadbalancer.server.port=8025"
    networks:
      - keycloak-net
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  keycloak-net:
    name: keycloak-net
    driver: bridge
